<div class="reset-page">
  <div class="reset-container">
    <div class="auth-brand">
      <span class="auth-brand-name">LUXE <span class="gold">ESTATES</span></span>
    </div>
    
    <div class="reset-header">
      <h3>Create New Password</h3>
      <p>Enter a strong password for your account.</p>
    </div>

    <p *ngIf="errorMsg" class="auth-error">{{ errorMsg }}</p>
    <p *ngIf="successMsg" class="auth-success">{{ successMsg }}</p>

    <form *ngIf="!successMsg && token" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <div class="auth-field">
        <label class="auth-label">New Password</label>
        <input type="password" class="auth-input" [class.invalid]="isFieldInvalid('password')" formControlName="password" placeholder="••••••••" />
        <span class="auth-validation" *ngIf="isFieldInvalid('password')">
          <ng-container *ngIf="resetForm.get('password')?.hasError('strongPassword')">Must be 8+ chars (uppercase, lowercase, number, special char)</ng-container>
          <ng-container *ngIf="resetForm.get('password')?.hasError('required')">Password is required</ng-container>
        </span>
      </div>

      <div class="auth-field">
        <label class="auth-label">Confirm New Password</label>
        <input type="password" class="auth-input" [class.invalid]="isFieldInvalid('confirmPassword')" formControlName="confirmPassword" placeholder="••••••••" />
        <span class="auth-validation" *ngIf="isFieldInvalid('confirmPassword')">Passwords do not match</span>
      </div>

      <button type="submit" class="auth-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">UPDATE PASSWORD</span>
        <span *ngIf="isLoading" class="auth-spinner"></span>
      </button>
    </form>
  </div>
</div>
