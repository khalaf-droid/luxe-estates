<nav class="nav" [class.scrolled]="isScrolled">
  <div class="nav-inner">
    <a class="nav-logo" routerLink="/">
      LUXE<span class="dot">·</span>ESTATES
    </a>

    <ul class="nav-links">
      <li><a routerLink="/properties" routerLinkActive="active">Properties</a></li>
      <li><a routerLink="/auctions" routerLinkActive="active">Auctions</a></li>
      <li><a routerLink="/" fragment="explore" routerLinkActive="active">Explore</a></li>
      <li><a routerLink="/agents" routerLinkActive="active">Agents</a></li>
    </ul>

    <div class="nav-actions">
      <ng-container *ngIf="auth.currentUser$ | async as user; else guestTemplate">
        <div class="user-profile-wrapper">
          <div class="user-info" (click)="toggleDropdown()">
            <div class="user-avatar">{{ user.name[0] | uppercase }}</div>
            <span class="user-name">{{ user.name }}</span>
            <span class="chevron" [class.open]="showDropdown">▾</span>
          </div>

          <div class="user-dropdown" *ngIf="showDropdown">
            <a class="dropdown-item" routerLink="/dashboard" (click)="showDropdown = false">👤 Dashboard</a>
            <a class="dropdown-item" routerLink="/favorites" (click)="showDropdown = false">❤️ Saved Items</a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item logout-btn" (click)="onLogout()">🚪 Sign Out</button>
          </div>
        </div>
      </ng-container>

      <ng-template #guestTemplate>
        <button class="btn-signin" (click)="openLogin()">SIGN IN</button>
      </ng-template>
      
      <button class="btn-list" (click)="onListPropertyClick()">List Property</button>
    </div>
  </div>
</nav>
