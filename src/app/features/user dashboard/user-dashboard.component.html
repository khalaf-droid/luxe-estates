<section class="user-shell">
  <aside class="user-sidebar">
    <div class="brand">
      <span>LUXE</span>
      <span>DASHBOARD</span>
    </div>

    <div class="user-avatar" *ngIf="user">
      <div class="avatar-circle">{{ initials }}</div>
      <div class="avatar-info">
        <span class="avatar-name">{{ user.name }}</span>
        <span class="avatar-role">{{ user.role | titlecase }}</span>
      </div>
    </div>

    <nav class="user-nav">
      <a *ngFor="let tab of dashboardTabs" [routerLink]="tab.link" routerLinkActive="active">
        <i [class]="tab.icon"></i>
        {{ tab.label }}
      </a>
    </nav>

    <a routerLink="/" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Back to site
    </a>
  </aside>

  <main class="user-content">
    <router-outlet></router-outlet>
  </main>
</section>
