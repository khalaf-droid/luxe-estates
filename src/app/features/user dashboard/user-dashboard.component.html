<div class="user-layout">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="user-sidebar">

    <div class="sidebar-brand">
      <div class="brand-logo-fallback"></div>
      <span class="brand-text">LUXE</span>
    </div>

    <!-- User Context -->
    <ng-container *ngIf="user$ | async as user">
    <div class="user-profile">
      <div class="avatar" *ngIf="!user.photo">{{ getInitials(user) }}</div>
      <img class="user-avatar-img" *ngIf="user.photo" [src]="user.photo" [alt]="user.name" />
      <div class="info">
        <span class="name">{{ user.name }}</span>
        <span class="role">{{ getRoleLabel(user) }}</span>
      </div>
    </div>

    <!-- KYC warning banner -->
    <div class="kyc-banner" *ngIf="!user.isVerified">
      <i class="ph ph-warning"></i>
      <span>Identity not verified</span>
    </div>

    <!-- Nav -->
    <nav class="user-nav">
      <span class="nav-section">My Account</span>

      <a routerLink="overview" routerLinkActive="active" class="nav-item">
        <i class="ph ph-squares-four"></i>
        Overview
      </a>

      <a routerLink="bookings" routerLinkActive="active" class="nav-item">
        <i class="ph ph-calendar-check"></i>
        My Bookings
      </a>

      <a routerLink="properties" routerLinkActive="active" class="nav-item"
         *ngIf="canListProperties(user)">
        <i class="ph ph-buildings"></i>
        <span>My Properties</span>
        
        <!-- Subscription Badge -->
        <ng-container *ngIf="dashboard$ | async as dash">
          <span class="sub-badge warning" *ngIf="!dash.subscription" title="No active subscription">
            <i class="ph ph-warning-circle"></i>
          </span>
          <span class="sub-badge expiring" *ngIf="dash.subscription && isSubscriptionExpiring(dash.subscription)" title="Expiring soon">
            <i class="ph ph-clock"></i>
          </span>
          <span class="sub-badge expired" *ngIf="dash.subscription && isSubscriptionExpired(dash.subscription)" title="Expired">
            <i class="ph ph-x-circle"></i>
          </span>
        </ng-container>
      </a>

      <!-- Owner Bookings -->
      <a routerLink="owner-bookings" routerLinkActive="active" class="nav-item"
         *ngIf="canListProperties(user)">
        <i class="ph ph-bell-ringing"></i>
        <span>Incoming Requests</span>
      </a>

      <!-- Owner: Viewing Requests Schedule -->
      <a routerLink="owner-viewing-requests" routerLinkActive="active" class="nav-item"
         *ngIf="canListProperties(user)">
        <i class="ph ph-calendar-dots"></i>
        <span>Viewing Schedule</span>
      </a>

      <a routerLink="saved" routerLinkActive="active" class="nav-item" *ngIf="canViewSaved(user)">
        <i class="ph ph-heart"></i>
        Saved
      </a>

      <!-- Viewing Requests (Buyer) -->
      <a routerLink="viewing-requests" routerLinkActive="active" class="nav-item">
        <i class="ph ph-eye"></i>
        Viewing Requests
      </a>

      <a routerLink="payments" routerLinkActive="active" class="nav-item">
        <i class="ph ph-credit-card"></i>
        Payments
      </a>

      <!-- Admin Specific -->
      <ng-container *ngIf="user.role === 'admin'">
        <span class="nav-section">Management</span>
        <a routerLink="/admin" class="nav-item admin-link">
          <i class="ph ph-shield-check"></i>
          Admin Center
        </a>
      </ng-container>
    </nav>
    </ng-container>

    <!-- Sidebar footer -->
    <div class="sidebar-footer">
      <button class="logout-link" (click)="logout()" [disabled]="isLoggingOut">
        <i class="ph ph-sign-out"></i>
        {{ isLoggingOut ? 'Logging out...' : 'Log out' }}
      </button>
    </div>

  </aside>

  <!-- ── Main content ─────────────────────────────────────────── -->
  <main class="user-main">
    <router-outlet></router-outlet>
  </main>

</div>
