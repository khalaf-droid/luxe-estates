<section class="user-shell">
  <aside class="user-sidebar">
    <div class="brand">
      <span>LUXE</span>
      <span>DASHBOARD</span>
    </div>

    <div class="user-avatar" *ngIf="user">
      <div class="avatar-circle">{{ initials }}</div>
      <div class="avatar-info">
        <span class="avatar-name">{{ user.name }}</span>
        <span class="avatar-role">{{ user.role | titlecase }}</span>
      </div>
    </div>

    <nav class="user-nav">
      <a routerLink="overview" routerLinkActive="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a routerLink="bookings" routerLinkActive="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        My Bookings
      </a>
      <a routerLink="properties" routerLinkActive="active" *ngIf="user?.role === 'host' || user?.role === 'admin'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        My Properties
      </a>
      <a routerLink="saved" routerLinkActive="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Saved
      </a>
      <a routerLink="payments" routerLinkActive="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
        Payments
      </a>
      <a routerLink="profile" routerLinkActive="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>

    <a routerLink="/" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Back to site
    </a>
  </aside>

  <main class="user-content">
    <router-outlet></router-outlet>
  </main>
</section>
