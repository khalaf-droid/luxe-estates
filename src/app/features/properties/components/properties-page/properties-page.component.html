<!-- ─────────────────────────────────────────────────────────────────────────
  LUXE ESTATES — Properties Page
  Production-ready: loading / error / empty / pagination states
───────────────────────────────────────────────────────────────────────────── -->

<section class="properties-section" #sectionRef>

  <!-- ── Section header ──────────────────────────────────────────────────── -->
  <div class="properties-header">
    <div>
      <div class="section-eyebrow">Curated Selection</div>
      <h2 class="section-title">Featured <em>Properties</em></h2>
    </div>
    <div>
      <p class="section-sub">
        Every listing is personally vetted by our expert team of global property consultants.
      </p>
    </div>
  </div>

  <!-- ── Filter tabs ─────────────────────────────────────────────────────── -->
  <div class="properties-tabs">
    <button
      *ngFor="let tab of filterTabs"
      class="prop-tab"
      [class.active]="(activeFilter$ | async) === tab.key"
      (click)="onFilterChange(tab.key)"
      data-cursor-hover>
      {{ tab.label }}
    </button>
  </div>

  <!-- ── Advanced Search & Filter Bar ──────────────────────────────────────── -->
  <div class="properties-search-bar">
    <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="search-form">
      <div class="search-inputs">
        <div class="input-group">
          <span class="input-icon">🔍</span>
          <input type="text" formControlName="search" placeholder="Search properties..." />
        </div>
        
        <div class="input-group">
          <span class="input-icon">📍</span>
          <input type="text" formControlName="city" placeholder="City or location" />
        </div>

        <button type="button" class="btn-toggle-filters" (click)="toggleFilterPanel()" [class.active]="isFilterExpanded">
          <span class="filter-icon">⚙️</span> Filters
        </button>
        
        <button type="submit" class="btn-gold" data-cursor-hover>Search</button>
      </div>

      <!-- Expandable advanced filters -->
      <div class="advanced-filters" [class.expanded]="isFilterExpanded">
        <div class="filter-row">
          <div class="filter-group">
            <label>Min Price ($)</label>
            <input type="number" formControlName="minPrice" placeholder="Any" />
          </div>
          <div class="filter-group">
            <label>Max Price ($)</label>
            <input type="number" formControlName="maxPrice" placeholder="Any" />
          </div>
          <div class="filter-group">
            <label>Bedrooms</label>
            <select formControlName="bedrooms">
              <option value="">Any</option>
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
              <option value="5">5+</option>
            </select>
          </div>
          <div class="filter-actions">
            <button type="button" class="btn-secondary" (click)="clearFilters()">Clear All</button>
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- ── Loading state ───────────────────────────────────────────────────── -->
  <div *ngIf="isLoading$ | async" class="properties-loading">
    <div class="loading-bar"></div>
  </div>

  <!-- ── Error state ─────────────────────────────────────────────────────── -->
  <div *ngIf="(error$ | async) as err" class="properties-error">
    <div class="error-card">
      <span class="error-icon">⚠</span>
      <p class="error-message">{{ err }}</p>
      <button class="btn-secondary" (click)="retryLoad()" data-cursor-hover>
        Try Again
      </button>
    </div>
  </div>

  <!-- ── Properties grid ─────────────────────────────────────────────────── -->
  <ng-container *ngIf="(isLoading$ | async) === false && (error$ | async) === null">
    <div *ngIf="(properties$ | async)?.length" class="properties-grid">
      <app-property-card
        *ngFor="let prop of properties$ | async; let i = index; trackBy: trackById"
        [property]="prop"
        [isFirst]="i === 0"
        (viewDetails)="onViewDetails($event)"
        (favoriteToggled)="onFavoriteToggled($event)">
      </app-property-card>
    </div>

    <!-- Empty state -->
    <div *ngIf="!(properties$ | async)?.length" class="properties-empty">
      <p class="properties-empty-text">No properties match this filter.</p>
      <button class="btn-secondary" (click)="onViewAll()" data-cursor-hover>
        View All Properties
      </button>
    </div>

    <!-- ── Pagination ─────────────────────────────────────────────────────── -->
    <div *ngIf="totalPages > 1" class="properties-pagination">
      <button
        class="pagination-btn"
        [disabled]="currentPage <= 1"
        (click)="onPageChange(currentPage - 1)"
        data-cursor-hover>
        ← Prev
      </button>

      <span class="pagination-info">
        Page {{ currentPage }} of {{ totalPages }}
        <span class="pagination-total">({{ totalResults }} properties)</span>
      </span>

      <button
        class="pagination-btn"
        [disabled]="currentPage >= totalPages"
        (click)="onPageChange(currentPage + 1)"
        data-cursor-hover>
        Next →
      </button>
    </div>
  </ng-container>

  <!-- ── View All button ─────────────────────────────────────────────────── -->
  <div class="properties-footer">
    <button class="btn-secondary" (click)="onViewAll()" data-cursor-hover>
      View All Properties →
    </button>
  </div>

</section>

<!-- ── Property Modal ──────────────────────────────────────────────────────── -->
<app-property-modal
  *ngIf="selectedProperty"
  [property]="selectedProperty"
  (closed)="onModalClosed()">
</app-property-modal>
