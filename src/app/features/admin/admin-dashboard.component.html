<section class="admin-dashboard">
  <div class="admin-dashboard__container" *ngIf="state$ | async as state">
    
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="breadcrumb">Admin Portal <span class="separator">/</span> <span class="current">OVERVIEW</span></div>
      <div class="actions">
        <button class="icon-btn"><i class="fa-regular fa-bell"></i><span class="dot-indicator"></span></button>
        <div class="market-status">
          <span class="label">MARKET STATUS</span>
          <span class="status"><span class="dot-green"></span> LIVE ANALYTICS</span>
        </div>
        <button class="btn-primary">GENERATE REPORT</button>
      </div>
    </div>

    <!-- Header -->
    <header class="dashboard-hero">
      <h1 class="section-title">Portfolio Performance</h1>
      <p class="quote">"Wealth consists not in having great possessions, but in having few wants." — Epictetus</p>
    </header>

    <div *ngIf="state.loading" class="loading-state">
      Loading dashboard data...
    </div>

    <ng-container *ngIf="!state.loading">
      <!-- KPI Grid -->
      <div class="metrics-grid">
        <app-kpi-card
          label="TOTAL USERS"
          [value]="state.stats?.users | number"
          [percentage]="12.4"
          [isPositive]="true"
          iconClass="fa-solid fa-users">
        </app-kpi-card>
        <app-kpi-card
          label="PROPERTIES"
          [value]="state.stats?.properties | number"
          [percentage]="5.2"
          [isPositive]="true"
          iconClass="fa-regular fa-building">
        </app-kpi-card>
        <app-kpi-card
          label="BOOKINGS"
          [value]="state.stats?.bookings | number"
          [percentage]="18.7"
          [isPositive]="true"
          iconClass="fa-regular fa-calendar-check">
        </app-kpi-card>
        <app-kpi-card
          label="TOTAL REVENUE"
          [value]="state.stats?.revenue | currency:'USD':'symbol':'1.0-0'"
          [percentage]="24.1"
          [isPositive]="true"
          iconClass="fa-solid fa-money-bill-wave">
        </app-kpi-card>
      </div>

      <!-- Revenue Chart Section -->
      <div class="chart-section">
        <div class="chart-header">
          <div>
            <h2>Revenue Analytics</h2>
            <p>Global monthly earnings distribution (Current Fiscal Year)</p>
          </div>
          <div class="period-toggles">
            <button class="toggle-btn" [class.active]="(period$ | async) === 'monthly'" (click)="setPeriod('monthly')">MONTH</button>
            <button class="toggle-btn">QUARTER</button>
            <button class="toggle-btn" [class.active]="(period$ | async) === 'yearly'" (click)="setPeriod('yearly')">YEAR</button>
          </div>
        </div>
        <app-revenue-chart [data]="state.revenue"></app-revenue-chart>
      </div>

      <!-- Data Grids -->
      <div class="data-grids">
        <app-transactions-table class="left-col" [transactions]="state.transactions"></app-transactions-table>
        <app-activity-feed class="right-col" [activities]="state.activities"></app-activity-feed>
      </div>
    </ng-container>

  </div>
</section>
