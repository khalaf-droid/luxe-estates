<div class="content-header">
  <h3>System Preferences</h3>
  <p>Customize your dashboard experience and notification settings.</p>
</div>

<div class="preferences-placeholder">
  <div class="pref-item">
    <div class="info">
      <h4><i class="fa-solid fa-bell"></i> Email Notifications</h4>
      <p>Receive updates about your bookings and account activity.</p>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="pref-item">
    <div class="info">
      <h4><i class="fa-solid fa-globe"></i> Language</h4>
      <p>Select your preferred language for the interface.</p>
    </div>
    <select class="luxury-select">
      <option value="en">English (US)</option>
      <option value="ar">Arabic (العربية)</option>
      <option value="fr">French (Français)</option>
    </select>
  </div>
</div>
