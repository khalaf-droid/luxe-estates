<div class="content-header">
  <h3>Access Control</h3>
  <p>Update your authentication credentials securely.</p>
</div>

<form [formGroup]="passwordForm" (ngSubmit)="submit()" class="luxury-form">
  <div class="form-grid">
    <div class="input-group full">
      <label>Current Password</label>
      <input type="password" formControlName="currentPassword" placeholder="••••••••">
    </div>
    <div class="input-group">
      <label>New Password</label>
      <input type="password" formControlName="newPassword" placeholder="Min 8 chars, 1 uppercase, 1 number">
      <div *ngIf="(passwordForm.get('newPassword')?.touched || passwordForm.touched) && (passwordForm.get('newPassword')?.invalid || passwordForm.errors?.['samePassword'])" class="error-msg">
        <span *ngIf="passwordForm.get('newPassword')?.errors?.['required']">New password is required.</span>
        <span *ngIf="passwordForm.get('newPassword')?.errors?.['minlength']">Must be at least 8 characters.</span>
        <span *ngIf="passwordForm.get('newPassword')?.errors?.['pattern'] && !passwordForm.get('newPassword')?.errors?.['minlength']">Must contain at least 1 uppercase, 1 lowercase, and 1 number.</span>
        <span *ngIf="passwordForm.errors?.['samePassword']">New password cannot be the same as the current password.</span>
      </div>
    </div>
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" formControlName="confirmPassword" placeholder="Must match new password">
      <div *ngIf="passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched" class="error-msg">
        Passwords do not match.
      </div>
    </div>
  </div>
  
  <div class="action-row">
    <button type="submit" class="btn-gold" [disabled]="passwordForm.invalid || isUpdating">
      {{ isUpdating ? 'UPDATING...' : 'CHANGE PASSWORD' }}
    </button>
  </div>
</form>
