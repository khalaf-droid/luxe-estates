<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Luxe Estates — Global Real Estate Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Discover extraordinary properties curated for the discerning — from penthouse suites in Manhattan to waterfront villas in Dubai.">
  <meta name="color-scheme" content="dark light">

  <!--
    ════════════════════════════════════════════════════════════
    ANTI-FLICKER THEME SCRIPT
    ════════════════════════════════════════════════════════════
    MUST run BEFORE Angular bootstraps to prevent:
      - White flash (FOUC) on dark-mode preference
      - Layout shift from theme switch during hydration

    Priority order:
      1. localStorage['luxe_theme'] — user's explicit choice
      2. prefers-color-scheme       — OS/browser preference
      3. 'dark'                     — safe default fallback

    This script is intentionally inline (not deferred) so the
    browser applies [data-theme] before the first paint.
    ════════════════════════════════════════════════════════════
  -->
  <script>
    (function () {
      var KEY = 'luxe_theme';
      try {
        var stored = localStorage.getItem(KEY);
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: light)').matches
        ) {
          theme = 'light';
        } else {
          theme = 'dark'; // safe default
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        // localStorage blocked (private browsing, security policy) — use dark default
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts — preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--
    Three-font system:
      Cormorant Garamond — display (headings, prices, hero, logo)
      DM Sans            — body (nav, descriptions, forms)
      Space Mono         — mono (labels, buttons, badges, eyebrows)

    IMPORTANT: Include italic variants of Cormorant for .hero-headline em
    and section-title em gold italic pattern.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  >
</head>
<body>
  <app-root></app-root>
</body>
</html>
